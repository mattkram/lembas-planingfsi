schema_version: 1

package:
  name: lembas-planingfsi
  version: ${{ env.get("PKG_VERSION") | default("0.0.0") }}

source:
  path: ..

build:
  number: 0
  noarch: python
  script:
    - SETUPTOOLS_SCM_PRETEND_VERSION=${{ env.get("PKG_VERSION") | default("0.0.0") }} python -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.11
    - pip
    - hatchling
    - hatch-vcs
  run:
    - python >=3.11
    - lembas
    - planingfsi

tests:
  - python:
      imports:
        - lembas_planingfsi
      pip_check: false

about:
  homepage: https://github.com/lembas-project/lembas-planingfsi
  license: MIT
  license_file: LICENSE
  summary: Lembas plugin for planingfsi hydrodynamic simulations
  description: |
    A lembas plugin that provides case handlers for running planingfsi
    hydrodynamic simulations, including planing flat plate analysis.
