[dependencies]
planingfsi = "*"
python = ">=3.11"

[dev-dependencies]
pytest = "*"
rattler-build = "*"

[plugin]
entry-point = "lembas_planingfsi:Plugin"
environment = "conda"
handlers = ["PlaningPlateCase"]

[project]
channels = ["conda-forge"]
description = "Lembas plugin for planingfsi hydrodynamic simulations"
name = "lembas-planingfsi"
platforms = ["linux-64", "osx-arm64"]
type = "plugin"

[tasks]
build = "rattler-build build --recipe conda.recipe/ --output-dir dist/"
test = "pytest tests/ -v"
